<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>input,textarea{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif!important}</style>
<title>سعر الصرف</title>
<script>
// === Dexie Polyfill: يعمل بدون إنترنت باستخدام IndexedDB مباشرة أو ذاكرة ===
class Dexie {
  constructor(name){ this.name=name; this._vers=[]; this._stores={}; this._db=null; this._mem={}; this._ready=null; }
  version(v){ const s={stores:(def)=>{Object.assign(this._stores,def);return s;}}; this._vers.push(v); return s; }
  _open(){
    if(this._ready) return this._ready;
    this._ready = new Promise(resolve=>{
      try{
        const req=indexedDB.open(this.name,this._vers.length||1);
        req.onupgradeneeded=e=>{
          const db=e.target.result;
          Object.entries(this._stores).forEach(([tbl,schema])=>{
            if(!db.objectStoreNames.contains(tbl)){
              const pk=schema.split(',')[0].replace('++','').trim();
              db.createObjectStore(tbl,{keyPath:pk||'id',autoIncrement:schema.includes('++')});
            }
          });
        };
        req.onsuccess=e=>{this._db=e.target.result;resolve(true);};
        req.onerror=()=>resolve(false);
      }catch(e){resolve(false);}
    });
    return this._ready;
  }
  _tbl(name){
    return {
      orderBy:(k)=>({reverse:()=>({toArray:async()=>{
        await this._open();
        if(!this._db) return Object.values(this._mem[name]||{}).reverse();
        return new Promise(r=>{
          const tx=this._db.transaction(name,'readonly');
          const req=tx.objectStore(name).getAll();
          req.onsuccess=()=>r((req.result||[]).reverse());
          req.onerror=()=>r([]);
        });
      }})}),
      get:async(k)=>{
        await this._open();
        if(!this._db) return (this._mem[name]||{})[k];
        return new Promise(r=>{
          const tx=this._db.transaction(name,'readonly');
          const req=tx.objectStore(name).get(k);
          req.onsuccess=()=>r(req.result);
          req.onerror=()=>r(null);
        });
      },
      put:async(obj)=>{
        await this._open();
        if(!this._db){if(!this._mem[name])this._mem[name]={};const k=obj.id||obj.key||Date.now();this._mem[name][k]=obj;return k;}
        return new Promise(r=>{
          const tx=this._db.transaction(name,'readwrite');
          const req=tx.objectStore(name).put(obj);
          req.onsuccess=()=>r(req.result);
          req.onerror=()=>r(null);
        });
      },
      add:async(obj)=>{
        await this._open();
        if(!this._db){if(!this._mem[name])this._mem[name]={};const k=Date.now();obj.id=k;this._mem[name][k]=obj;return k;}
        return new Promise(r=>{
          const tx=this._db.transaction(name,'readwrite');
          const req=tx.objectStore(name).add(obj);
          req.onsuccess=()=>r(req.result);
          req.onerror=()=>r(null);
        });
      },
      delete:async(k)=>{
        await this._open();
        if(!this._db){delete(this._mem[name]||{})[k];return;}
        return new Promise(r=>{
          const tx=this._db.transaction(name,'readwrite');
          tx.objectStore(name).delete(k);
          tx.oncomplete=r;
        });
      },
      toArray:async()=>{
        await this._open();
        if(!this._db) return Object.values(this._mem[name]||{});
        return new Promise(r=>{
          const tx=this._db.transaction(name,'readonly');
          const req=tx.objectStore(name).getAll();
          req.onsuccess=()=>r(req.result||[]);
          req.onerror=()=>r([]);
        });
      }
    };
  }
  get txs(){ return this._tbl('txs'); }
  get settings(){ return this._tbl('settings'); }
}
window.Dexie = Dexie;
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
  body{background:#050a18;min-height:100vh;padding:20px;direction:rtl;color:#fff;position:relative;overflow-x:hidden}
  input,span,strong,.val,.tx-info{font-variant-numeric:lining-nums;unicode-bidi:plaintext}
  #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
  .container{max-width:660px;margin:0 auto;position:relative;z-index:1}
  h1{text-align:center;font-size:1.6rem;margin-bottom:24px;background:linear-gradient(135deg,#4a9eff,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .card{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:14px;padding:20px;margin-bottom:16px}
  .card-title{font-size:.78rem;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:14px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .input-group{display:flex;flex-direction:column;gap:6px}
  label{font-size:.82rem;color:#aaa;font-weight:600}
  input,select{background:#13131f;border:1px solid #2a2a3e;border-radius:8px;padding:10px 12px;color:#fff;font-size:1rem;width:100%;transition:.2s}
  input:focus,select:focus{outline:none;border-color:#4a9eff;box-shadow:0 0 0 3px rgba(74,158,255,.15)}
  select option{background:#1e1e2e}

  .amounts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .amt-box{background:#13131f;border:1px solid #2a2a3e;border-radius:10px;padding:12px}
  .amt-box label{font-size:.78rem;color:#888;margin-bottom:6px;display:block}
  .amt-box input{border:none;background:transparent;padding:0;font-size:1.1rem;font-weight:700;color:#4a9eff}
  .amt-box input:focus{box-shadow:none}
  .amt-box .flag{font-size:1.2rem;margin-left:4px}

  .prices-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .price-card{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:10px;padding:14px;text-align:center}
  .price-card .lbl{font-size:.78rem;color:#888;margin-bottom:6px}
  .price-card .val{font-size:1.35rem;font-weight:700;color:#4a9eff}
  .arrow{margin-left:4px;font-size:.95rem}
  .arrow-up{color:#4caf50}.arrow-down{color:#f44336}

  .trade-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .btn{border:none;border-radius:10px;padding:13px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;width:100%}
  .btn:hover{filter:brightness(1.12);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .buy-btn{background:linear-gradient(135deg,#2e7d32,#4caf50);color:#fff}
  .sell-btn{background:linear-gradient(135deg,#c62828,#f44336);color:#fff}
  .log-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .save-btn{background:#1e3a5f;color:#4a9eff;border:1px solid #4a9eff}
  .clear-btn{background:#3a1a1a;color:#f44336;border:1px solid #f44336}

  .result-words{background:#1a2a1a;border:1px solid #2a4a2a;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:.95rem;color:#a0e0a0;line-height:1.7;display:none}
  .result-words .rw-label{font-size:.75rem;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .result-words .rw-text{color:#4caf50;font-weight:700;font-size:1rem;direction:rtl}
  .history{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:14px;padding:16px;max-height:380px;overflow-y:auto}
  .history::-webkit-scrollbar{width:4px}
  .history::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
  .history-title{font-size:.78rem;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:12px}
  .tx{background:#13131f;border-radius:8px;padding:14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .tx.buy{border-right:3px solid #4caf50}.tx.sell{border-right:3px solid #f44336}
  .tx-info{flex:1;font-size:.82rem;color:#ccc;line-height:1.9}
  .tx-info strong{color:#fff}
  .type-buy{color:#4caf50;font-weight:700}.type-sell{color:#f44336;font-weight:700}
  .del-btn{background:#3a1a1a;border:1px solid #f44336;color:#f44336;border-radius:6px;padding:4px 10px;font-size:.75rem;cursor:pointer;white-space:nowrap;transition:.2s}
  .del-btn:hover{background:#f44336;color:#fff}
  .empty{text-align:center;color:#555;font-size:.9rem;padding:20px}
  .rate-hint{font-size:.75rem;color:#666;margin-top:4px}
  .tx-tafqeet{color:#a78bfa;font-size:.8rem;font-style:italic;direction:rtl;margin-top:2px}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e1e2e;border:1px solid #2a2a3e;border-radius:12px;padding:12px 24px;font-size:.92rem;color:#fff;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.success{border-color:#4caf50;color:#4caf50}
  .toast.warn{border-color:#f9a825;color:#f9a825}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:10000;opacity:0;pointer-events:none;transition:opacity .25s}
  .modal-overlay.show{opacity:1;pointer-events:all}
  .modal-box{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:18px;padding:28px 24px;max-width:340px;width:90%;text-align:center;transform:scale(.92) translateY(16px);transition:transform .25s;box-shadow:0 8px 48px rgba(0,0,0,.6)}
  .modal-overlay.show .modal-box{transform:scale(1) translateY(0)}
  .modal-icon{font-size:2.4rem;margin-bottom:10px}
  .modal-title{font-size:1.05rem;font-weight:700;color:#fff;margin-bottom:8px}
  .modal-body{font-size:.82rem;color:#aaa;line-height:1.7;margin-bottom:20px;direction:rtl}
  .modal-body strong{color:#f9a825}
  .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-btn{border:none;border-radius:10px;padding:11px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s}
  .modal-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
  .modal-btn.yes{background:linear-gradient(135deg,#2e7d32,#4caf50);color:#fff}
  .modal-btn.no{background:#2a2a3e;color:#aaa;border:1px solid #3a3a5e}

  .cloud-section{margin-top:20px}
  .cloud-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cloud-title{font-size:.78rem;text-transform:uppercase;letter-spacing:1px;color:#888}
  .cloud-refresh{background:none;border:1px solid #2a2a3e;color:#4a9eff;border-radius:8px;padding:5px 12px;font-size:.75rem;cursor:pointer;transition:.2s}
  .cloud-refresh:hover{background:#1e1e2e;border-color:#4a9eff}
  .cloud-table-wrap{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:14px;overflow:hidden}
  .cloud-table{width:100%;border-collapse:collapse;font-size:.78rem}
  .cloud-table th{background:#13131f;color:#888;font-weight:600;padding:10px 12px;text-align:right;border-bottom:1px solid #2a2a3e;letter-spacing:.5px}
  .cloud-table td{padding:10px 12px;border-bottom:1px solid #1a1a2e;color:#ccc;vertical-align:middle}
  .cloud-table tr:last-child td{border-bottom:none}
  .cloud-table tr:hover td{background:#13131f}
  .cloud-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:700}
  .cloud-badge.buy{background:rgba(76,175,80,.15);color:#4caf50;border:1px solid rgba(76,175,80,.3)}
  .cloud-badge.sell{background:rgba(244,67,54,.15);color:#f44336;border:1px solid rgba(244,67,54,.3)}
  .cloud-empty{text-align:center;color:#555;font-size:.85rem;padding:24px}
  .cloud-tafqeet{color:#a78bfa;font-size:.72rem;display:block;margin-top:2px;font-style:italic}
  .cloud-status{display:flex;align-items:center;gap:6px;font-size:.72rem;margin-bottom:8px}
  .cloud-dot{width:7px;height:7px;border-radius:50%;background:#555}
  .cloud-dot.ok{background:#4caf50;box-shadow:0 0 6px #4caf50}
  .cloud-dot.err{background:#f44336}
  .cloud-act{background:transparent;border:1px solid #2a2a3e;border-radius:6px;padding:3px 7px;font-size:.82rem;cursor:pointer;margin:0 2px;transition:.15s}
  .cloud-act:hover{transform:translateY(-1px)}
  .cloud-act.del{color:#f44336;border-color:rgba(244,67,54,.4)}
  .cloud-act.del:hover{background:rgba(244,67,54,.15)}
  .cloud-act.restore{color:#4caf50;border-color:rgba(76,175,80,.4)}
  .cloud-act.restore:hover{background:rgba(76,175,80,.15)}

  .auth-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:99999;background:radial-gradient(ellipse at center,#0d1428 0%,#050a18 100%);padding:20px}
  .auth-box{background:#1e1e2e;border:1px solid #2a2a3e;border-radius:20px;padding:32px 28px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6);position:relative;overflow:hidden}
  .auth-box::before{content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(74,158,255,.08),transparent 30%);animation:spin 8s linear infinite;z-index:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .auth-box>*{position:relative;z-index:1}
  .auth-logo{text-align:center;font-size:2.4rem;margin-bottom:6px}
  .auth-title{text-align:center;font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,#4a9eff,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
  .auth-sub{text-align:center;font-size:.82rem;color:#888;margin-bottom:22px}
  .auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:18px;background:#13131f;border-radius:10px;padding:4px}
  .auth-tab{padding:10px;text-align:center;font-size:.9rem;font-weight:700;color:#888;cursor:pointer;border-radius:8px;transition:.2s}
  .auth-tab.active{background:linear-gradient(135deg,#4a9eff,#a78bfa);color:#fff}
  .auth-field{margin-bottom:14px}
  .auth-field label{display:block;font-size:.78rem;color:#aaa;margin-bottom:5px;font-weight:600}
  .auth-field input{width:100%;background:#13131f;border:1px solid #2a2a3e;border-radius:9px;padding:11px 14px;color:#fff;font-size:.95rem;transition:.2s}
  .auth-field input:focus{outline:none;border-color:#4a9eff;box-shadow:0 0 0 3px rgba(74,158,255,.15)}
  .auth-btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#4a9eff,#a78bfa);color:#fff;transition:.2s;margin-top:6px}
  .auth-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .auth-msg{font-size:.82rem;text-align:center;margin-top:12px;min-height:18px}
  .auth-msg.err{color:#f44336}
  .auth-msg.ok{color:#4caf50}
  .user-bar{display:flex;align-items:center;justify-content:space-between;background:#1e1e2e;border:1px solid #2a2a3e;border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:.85rem}
  .user-bar .user-info{color:#ccc;display:flex;align-items:center;gap:8px}
  .user-bar .user-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#4a9eff,#a78bfa);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:.9rem}
  .logout-btn{background:transparent;border:1px solid #f44336;color:#f44336;border-radius:8px;padding:5px 12px;font-size:.78rem;cursor:pointer;transition:.2s}
  .logout-btn:hover{background:#f44336;color:#fff}
</style>
</head>
<body>

<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">💱</div>
    <div class="auth-title">سعر الصرف</div>
    <div class="auth-sub">سجّل دخولك للمتابعة</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">تسجيل الدخول</div>
      <div class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">حساب جديد</div>
    </div>
    <div id="auth-form">
      <div class="auth-field">
        <label>اسم المستخدم</label>
        <input type="text" id="auth-user" autocomplete="username" required minlength="2" placeholder="مثال: محسن أو mohsen" onkeydown="if(event.key==='Enter')submitAuth()">
      </div>
      <div class="auth-field">
        <label>كلمة المرور</label>
        <input type="password" id="auth-pass" autocomplete="current-password" required minlength="4" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()">
      </div>
      <div class="auth-field" id="hint-field" style="display:none">
        <label>تلميح لكلمة المرور <span style="color:#666;font-weight:400">(يساعدك إذا نسيتها)</span></label>
        <input type="text" id="auth-hint" placeholder="مثال: اسم قطّتي">
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:.85rem;color:#bbb;cursor:pointer;margin:6px 0 10px;user-select:none">
        <input type="checkbox" id="auth-remember" checked style="width:16px;height:16px;accent-color:#4a9eff;cursor:pointer">
        <span>تذكّرني — إبقاء الدخول لمدة 30 يوماً</span>
      </label>
      <button type="button" class="auth-btn" id="auth-submit" onclick="submitAuth()">دخول</button>
      <div style="text-align:center;margin-top:10px">
        <a href="#" id="forgot-link" onclick="event.preventDefault();showHint();" style="color:#4a9eff;font-size:.82rem;text-decoration:none">نسيت كلمة المرور؟</a>
      </div>
      <div class="auth-msg" id="auth-msg"></div>
    </div>
  </div>
</div>

<div class="container" id="app-container" style="display:none">
  <div class="user-bar">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">?</div>
      <div><div style="color:#fff;font-weight:600" id="user-email">—</div><div style="color:#666;font-size:.7rem">مستخدم مُسجّل</div></div>
    </div>
    <button class="logout-btn" onclick="logout()">خروج ↩</button>
  </div>
  <h1>💱 سعر الصرف</h1>

  <div class="card">
    <div class="card-title">إعدادات العملة</div>
    <div class="grid-2">
      <div class="input-group">
        <label>العملة الأجنبية</label>
        <select id="currency" onchange="onCurrencyChange()">
          <option value="USD">🇺🇸 دولار أمريكي (USD)</option>
          <option value="IDR">🇮🇩 روبية إندونيسية (IDR)</option>
          <option value="EUR">🇪🇺 يورو (EUR)</option>
          <option value="GBP">🇬🇧 جنيه إسترليني (GBP)</option>
          <option value="AED">🇦🇪 درهم إماراتي (AED)</option>
          <option value="KWD">🇰🇼 دينار كويتي (KWD)</option>
          <option value="BHD">🇧🇭 دينار بحريني (BHD)</option>
          <option value="QAR">🇶🇦 ريال قطري (QAR)</option>
          <option value="OMR">🇴🇲 ريال عماني (OMR)</option>
          <option value="JOD">🇯🇴 دينار أردني (JOD)</option>
          <option value="EGP">🇪🇬 جنيه مصري (EGP)</option>
          <option value="TRY">🇹🇷 ليرة تركية (TRY)</option>
          <option value="INR">🇮🇳 روبية هندية (INR)</option>
          <option value="PKR">🇵🇰 روبية باكستانية (PKR)</option>
          <option value="MYR">🇲🇾 رينغيت ماليزي (MYR)</option>
          <option value="PHP">🇵🇭 بيزو فلبيني (PHP)</option>
          <option value="BDT">🇧🇩 تاكا بنغلاديشية (BDT)</option>
          <option value="ETB">🇪🇹 بر إثيوبي (ETB)</option>
          <option value="NGN">🇳🇬 نيرة نيجيرية (NGN)</option>
          <option value="CNY">🇨🇳 يوان صيني (CNY)</option>
          <option value="JPY">🇯🇵 ين ياباني (JPY)</option>
          <option value="KRW">🇰🇷 وون كوري (KRW)</option>
        </select>
      </div>
      <div class="input-group">
        <label for="rate">سعر الصرف (ريال لكل وحدة)
          <button type="button" onclick="fetchLiveRates(true)" id="live-btn" style="background:linear-gradient(135deg,#1e5f3a,#2e7d32);border:none;color:#fff;border-radius:6px;padding:2px 8px;font-size:.7rem;cursor:pointer;margin-right:6px">🟢 حي</button>
        </label>
        <input type="number" id="rate" step="0.0001" min="0" oninput="calc('rate')">
        <div class="rate-hint" id="rate-hint"></div>
        <div class="rate-hint" id="live-status" style="color:#4caf50"></div>
      </div>
    </div>

    <div class="amounts-grid">
      <div class="amt-box">
        <label><span class="flag">🇸🇦</span> المبلغ بالريال السعودي</label>
        <input type="number" id="sar" min="0" oninput="calc('sar')" placeholder="0.00">

<script>
// === Safe Storage: يتجاوز حظر localStorage في Edge/file:// ===
const SafeStore = {
  _mem: {},
  set(key, val) {
    try { localStorage.setItem(key, val); return; } catch(e){}
    try { sessionStorage.setItem(key, val); return; } catch(e){}
    // fallback: cookie
    try {
      const expires = new Date(Date.now()+30*24*60*60*1000).toUTCString();
      document.cookie = `${key}=${encodeURIComponent(val)};expires=${expires};path=/`;
    } catch(e){}
    this._mem[key] = val;
  },
  get(key) {
    try { const v=localStorage.getItem(key); if(v!==null)return v; } catch(e){}
    try { const v=sessionStorage.getItem(key); if(v!==null)return v; } catch(e){}
    try {
      const m = document.cookie.match('(^|;)\\s*'+key+'=([^;]+)');
      if(m) return decodeURIComponent(m[2]);
    } catch(e){}
    return this._mem[key] || null;
  },
  remove(key) {
    try { localStorage.removeItem(key); } catch(e){}
    try { sessionStorage.removeItem(key); } catch(e){}
    try { document.cookie = `${key}=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/`; } catch(e){}
    delete this._mem[key];
  }
};
/*
  ملاحظة أمنية:
  - SUPABASE_KEY مفتاح anon عام، الحماية تأتي من RLS في Supabase.
  - للحماية الأقوى: استخدم Supabase Edge Function للتحقق من كلمة المرور.

function getSBHeaders(){
  const token = AUTH?.access_token || SUPABASE_KEY;
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + token,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };
}
// Backwards-compat proxy (some code references SB_HEADERS directly)
const SB_HEADERS = new Proxy({}, { get:(_,k)=>getSBHeaders()[k], ownKeys:()=>Object.keys(getSBHeaders()), getOwnPropertyDescriptor:(_,k)=>({enumerable:true,configurable:true,value:getSBHeaders()[k]}) });

// ================= AUTH (custom username+password table) =================
let authMode='login';

async function hashPwd(pass){
  const buf = new TextEncoder().encode('sarf_salt_v1|'+pass);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

  document.getElementById('auth-submit').textContent = mode==='login'?'دخول':'إنشاء الحساب';
  document.getElementById('hint-field').style.display = mode==='signup' ? '' : 'none';
  document.getElementById('forgot-link').style.display = mode==='login' ? '' : 'none';
  document.getElementById('auth-pass').setAttribute('autocomplete', mode==='login'?'current-password':'new-password');
  setAuthMsg('');
}

function setAuthMsg(msg, type=''){
  const el=document.getElementById('auth-msg');
  el.innerHTML=msg; el.className='auth-msg '+type;
}

async function submitAuth(){
  const username=document.getElementById('auth-user').value.trim().toLowerCase();
  const pass    =document.getElementById('auth-pass').value;
  const hint    =document.getElementById('auth-hint').value.trim();
  const btn     =document.getElementById('auth-submit');
  if(!username||!pass){ setAuthMsg('⚠️ أدخل البيانات كاملة','err'); return; }
  if(username.length<2){ setAuthMsg('⚠️ اسم المستخدم قصير جداً','err'); return; }
  btn.disabled=true; btn.textContent='⏳ جاري...';
  setAuthMsg('');
  try{
    const pwdHash = await hashPwd(pass);
    if(authMode==='signup'){
      const res = await fetch(SUPABASE_URL+'/rest/v1/users', {
        method:'POST',
        headers:{ ...getSBHeaders(), 'Prefer':'return=representation' },
        body: JSON.stringify({ username, password_hash:pwdHash, password_hint:hint||null, app_origin: 'sarf_history' })
      });
      const data = await res.json();
      if(!res.ok){
        console.error('Signup error full:', JSON.stringify(data));
        if(data?.code==='23505'||data?.message?.includes('duplicate')){
          setAuthMsg('⚠️ اسم المستخدم موجود مسبقاً','err'); return;
        }
        // عمود غير موجود - جرب بدون hint
        if(data?.message?.includes('hint')){
          const res2 = await fetch(SUPABASE_URL+'/rest/v1/users', {
            method:'POST',
            headers:{ ...getSBHeaders(), 'Prefer':'return=representation' },
            body: JSON.stringify({ username, password_hash:pwdHash, app_origin: 'sarf_history' })
          });
          const data2 = await res2.json();
          if(!res2.ok){ setAuthMsg('⚠️ '+(data2?.message||'فشل إنشاء الحساب — تحقق من أعمدة جدول users'),'err'); return; }
          loginSuccess(Array.isArray(data2)?data2[0]:data2); return;
        }
        setAuthMsg('⚠️ '+(data?.message||data?.hint||JSON.stringify(data)),'err'); return;
      }
      setAuthMsg('✅ تم إنشاء الحساب. جاري الدخول...','ok');
      const user = Array.isArray(data)?data[0]:data;
      console.log('signup response keys:', Object.keys(user||{}));
      loginSuccess(user);
      return;
    }
    // login — اجلب كل الأعمدة أولاً لمعرفة الهيكل
    let res = await fetch(
      SUPABASE_URL+`/rest/v1/users?username=eq.${encodeURIComponent(username)}&select=*`,
      { headers: getSBHeaders() }
    );
    let rows = await res.json();
    if(!res.ok){
      console.error('Login failed:', JSON.stringify(rows));
      setAuthMsg('⚠️ خطأ في الاتصال: '+(rows?.message||JSON.stringify(rows)),'err');
      return;
    }
    if(!rows.length){ setAuthMsg('⚠️ اسم المستخدم غير موجود','err'); return; }
    console.log('users row keys:', Object.keys(rows[0]||{}));
    const u = rows[0];
    if(u.password_hash !== pwdHash){ setAuthMsg('⚠️ كلمة المرور غير صحيحة','err'); return; }
    loginSuccess(u);
  }catch(e){
    console.error('Auth error:', e);
    setAuthMsg('⚠️ خطأ: '+e.message,'err');
  }finally{
    btn.disabled=false;
    btn.textContent = authMode==='login'?'دخول':'إنشاء الحساب';
  }
}

function loginSuccess(user){
  const remember = document.getElementById('auth-remember')?.checked;
  const ttl = remember ? 30*24*60*60*1000 : 12*60*60*1000; // 30ي أو 12س
  AUTH = {
    id: user.id || user.username || user.user_name || 'user',
    username: user.username || user.user_name || 'user',
    expires_at: Date.now()+ttl
  };
  SafeStore.remove('sb_auth');
  SafeStore.set('sb_auth', JSON.stringify(AUTH));
  setAuthMsg('✅ تم الدخول بنجاح','ok');
  setTimeout(showApp, 300);
}

async function showHint(){
  const username=document.getElementById('auth-user').value.trim().toLowerCase();
  if(!username){ setAuthMsg('⚠️ اكتب اسم المستخدم أولاً ثم اضغط "نسيت"','err'); return; }
  setAuthMsg('⏳ جاري البحث عن التلميح...');
  try{
    const res = await fetch(
      SUPABASE_URL+`/rest/v1/users?username=eq.${encodeURIComponent(username)}&select=password_hint`,
      { headers: getSBHeaders() }
    );
    const rows = await res.json();
    if(!rows.length){ setAuthMsg('⚠️ اسم المستخدم غير موجود','err'); return; }
    const hint = rows[0].password_hint || rows[0].hint;
    if(!hint){ setAuthMsg('💡 لا يوجد تلميح محفوظ لهذا الحساب','err'); return; }
    setAuthMsg('💡 تلميح: <strong style="color:#f9a825">'+hint+'</strong>','ok');
  }catch(e){
    setAuthMsg('⚠️ خطأ: '+e.message,'err');
  }
}

async function loadCloudHistory(){
  const el=document.getElementById('cloud-list');
  const dot=document.getElementById('cloud-dot');
  const statusTxt=document.getElementById('cloud-status-text');
  el.innerHTML='<div class="cloud-empty">جاري التحميل...</div>';
  purgeOldDeleted();
  const isTrash = cloudView==='trash';
  const filter = isTrash ? 'deleted_at=not.is.null' : 'deleted_at=is.null';
  const userFilter = AUTH?.username ? `&user_name=eq.${encodeURIComponent(AUTH.username)}` : '';
  try{
    const res = await fetch(
      SUPABASE_URL+'/rest/v1/sarf_history?select=*&'+filter+userFilter+'&order=created_at.desc&limit=20',
      {headers: SB_HEADERS}
    );
    if(!res.ok){
      const t=await res.text();
      console.error('Supabase fetch error:',t);
      throw new Error(t);
    }
    const data = await res.json();
    dot.className='cloud-dot ok';
    statusTxt.textContent='متصل • آخر تحديث: '+new Date().toLocaleTimeString('ar-SA');
    statusTxt.style.color='#4caf50';
    if(!data||!data.length){
      el.innerHTML=`<div class="cloud-empty">${isTrash?'🗑️ سلة المحذوفات فارغة':'لا توجد عمليات سحابية بعد'}</div>`;
      return;
    }
    el.innerHTML=`<table class="cloud-table">
      <thead><tr>
        <th>العملة</th>
        <th>المبلغ (ر.س)</th><th>المُحوَّل</th>
        <th>سعر الصرف</th><th>التفقيط</th>
        <th>التاريخ</th>
        <th>${isTrash?'متبقي':''}</th>
        <th></th>
      </tr></thead>
      <tbody>${data.map(r=>{
        const cur=r.target_currency||'';
        const info=CURRENCIES[cur]||{};
        const dateStr=r.created_at?new Date(r.created_at).toLocaleString('ar-SA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
        let remaining='';
        if(isTrash && r.deleted_at){
          const days=Math.max(0, 30 - Math.floor((Date.now()-new Date(r.deleted_at).getTime())/86400000));
          remaining=`<span style="color:${days<7?'#f44336':'#f9a825'};font-weight:700">${days} يوم</span>`;
        }
        const actions = isTrash
          ? `<button class="cloud-act restore" onclick="restoreCloud(${r.id})" title="استعادة">♻️</button>
             <button class="cloud-act del" onclick="hardDeleteCloud(${r.id})" title="حذف نهائي">✖</button>`
          : `<button class="cloud-act del" onclick="softDeleteCloud(${r.id})" title="حذف">🗑️</button>`;
        return `<tr>
          <td>${info.flag||''} ${cur}</td>
          <td>${parseFloat(r.base_amount||0).toLocaleString('en-US',{minimumFractionDigits:2})}</td>
          <td style="color:#4a9eff;font-weight:700">${parseFloat(r.converted_amount||0).toLocaleString('en-US',{minimumFractionDigits:2})}</td>
          <td style="color:#a78bfa">${parseFloat(r.exchange_rate||0)}</td>
          <td><span class="cloud-tafqeet">${r.arabic_text||'—'}</span></td>
          <td style="color:#666;font-size:.7rem">${dateStr}</td>
          <td style="font-size:.7rem">${remaining}</td>
          <td style="white-space:nowrap">${actions}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  }catch(e){
    console.error('Supabase error:',e);
    dot.className='cloud-dot err';
    statusTxt.textContent='خطأ في الاتصال';
    statusTxt.style.color='#f44336';
    el.innerHTML=`<div class="cloud-empty">⚠️ خطأ: <span style="color:#f9a825;font-size:.75rem;direction:ltr;display:block;margin-top:4px">${e?.message||e?.code||JSON.stringify(e)}</span></div>`;
  }
}

  function drawOrbs(){

      const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,o.c);
      g.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
    });
  }

  function drawWaves(){
    waves.forEach(w=>{
      w.phase+=w.speed;
      ctx.beginPath();
      ctx.moveTo(0,w.y);
      for(let x=0;x<=W;x+=4){
        ctx.lineTo(x, w.y+Math.sin(x*w.freq+w.phase)*w.amp);
      }
      ctx.strokeStyle=w.color;
      ctx.lineWidth=1.5;
      ctx.stroke();
    });
  }

  function drawParticles(){
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV;
      if(p.y<-40) p.y=H+20;
      if(p.x<-40) p.x=W+20;
      if(p.x>W+40) p.x=-20;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha=p.opacity;
      ctx.font=`bold ${p.size}px serif`;
      ctx.fillStyle='#a0c8ff';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(p.sym,0,0);
      ctx.restore();
    });
    ctx.globalAlpha=1;
  }

  function drawGrid(){
    ctx.strokeStyle='rgba(74,158,255,0.03)';
    ctx.lineWidth=1;
    for(let x=0;x<W;x+=60){
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
    }
    for(let y=0;y<H;y+=60){
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
    }
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#050a18');
    bg.addColorStop(0.5,'#080d20');
    bg.addColorStop(1,'#06091a');
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,W,H);
    drawGrid();
    drawOrbs();
    drawWaves();
    drawParticles();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize',()=>{resize();initOrbs();initWaves();});
  resize();initParticles();initOrbs();initWaves();
  loop();
})();

function showConfirm(msg, {title='تأكيد العملية', icon='⚠️', yesText='نعم', noText='إلغاء'}={}){
  return new Promise(resolve=>{
    document.getElementById('modal-body').innerHTML=msg;
    document.querySelector('.modal-title').textContent=title;
    document.querySelector('.modal-icon').textContent=icon;
    document.getElementById('modal-yes').textContent=yesText;
    document.getElementById('modal-no').textContent=noText;
    const overlay=document.getElementById('modal-overlay');
    overlay.classList.add('show');
    const yes=document.getElementById('modal-yes');
    const no=document.getElementById('modal-no');
    function close(val){overlay.classList.remove('show');yes.onclick=null;no.onclick=null;resolve(val);}
    yes.onclick=()=>close(true);
    no.onclick=()=>close(false);
  });
}

function showToast(msg, type='success', duration=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type;
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),duration);
}

let LIVE_RATES = {};
let LIVE_UPDATED_AT = 0;

function onCurrencyChange(resetRate=true){
  const code=document.getElementById('currency').value;
  const c=CURRENCIES[code];
  if(resetRate){
    const live = LIVE_RATES[code];
    document.getElementById('rate').value = live || c.rate;
  }
  document.getElementById('foreign-flag').textContent=c.flag;
  document.getElementById('foreign-name').textContent=code;
  document.getElementById('rate-hint').textContent=`1 ${code} = ${parseFloat(document.getElementById('rate').value).toLocaleString('en-US')} ر.س`;
  calc('sar');
}

async function fetchLiveRates(showToastMsg=false){
  const status=document.getElementById('live-status');
  const btn=document.getElementById('live-btn');
  if(status) status.textContent='⏳ جاري جلب الأسعار العالمية...';
  if(btn) btn.style.opacity='.6';
  try{
    const res = await fetch('https://open.er-api.com/v6/latest/SAR');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j = await res.json();
    if(j.result!=='success' || !j.rates) throw new Error('bad response');
    // j.rates.USD = USD per 1 SAR  =>  SAR per 1 USD = 1/rate
    LIVE_RATES = {};
    for(const code in CURRENCIES){
      if(j.rates[code]){
        LIVE_RATES[code] = 1 / j.rates[code];
        CURRENCIES[code].rate = LIVE_RATES[code];
      }
    }
    LIVE_UPDATED_AT = Date.now();
    const t = new Date(j.time_last_update_unix*1000).toLocaleString('ar-SA',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'});
    if(status) status.textContent='🟢 أسعار حية • آخر تحديث من السوق: '+t;
    // update current rate input
    const code = document.getElementById('currency').value;
    if(LIVE_RATES[code]){
      document.getElementById('rate').value = LIVE_RATES[code].toFixed(6);
      calc('rate');
    }
    if(showToastMsg) showToast('✅ تم تحديث الأسعار من السوق العالمي');
  }catch(e){
    console.error('live rates err:',e);
    if(status){ status.textContent='⚠️ تعذّر جلب الأسعار الحية'; status.style.color='#f9a825'; }
    if(showToastMsg) showToast('⚠️ تعذّر جلب الأسعار','warn');
  }finally{
    if(btn) btn.style.opacity='1';
  }
}

const ONES=['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة','عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر'];
const TENS=['','','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];

function toArabicWords(num){
  try{
    const whole = Math.floor(Math.abs(num));
    const dec = Math.round((Math.abs(num) - whole) * 100);
    const fn = (typeof n2words === 'function') ? n2words
              : (typeof window.n2words === 'function') ? window.n2words
              : null;
    if(fn){
      let text = fn(whole, {lang:'ar'});
      if(dec > 0) text += ' وَ' + fn(dec, {lang:'ar'}) + ' هللة';
      return text;
    }
  }catch(e){}
  return numToAr(num);
}

function numToAr(n){
  n=Math.floor(n);
  if(n===0)return'صفر';
  if(n<0)return'سالب '+numToAr(-n);
  let parts=[];
  if(n>=1000000000){parts.push(numToAr(Math.floor(n/1000000000))+' مليار');n%=1000000000;}
  if(n>=1000000){parts.push(numToAr(Math.floor(n/1000000))+' مليون');n%=1000000;}
  if(n>=1000){parts.push(numToAr(Math.floor(n/1000))+' ألف');n%=1000;}
  if(n>=100){
    const hundreds = Math.floor(n/100);
    parts.push(hundreds===1 ? 'مئة' : hundreds===2 ? 'مئتان' : ONES[hundreds]+' مئة');
    n%=100;
  }
  if(n>=20){
    let t=TENS[Math.floor(n/10)];
    if(n%10) t=ONES[n%10]+' و'+TENS[Math.floor(n/10)];
    parts.push(t);
  } else if(n>0){
    parts.push(ONES[n]);
  }
  return parts.join(' و');
}
function updateWords(inputId, wordsId){
  const inp=document.getElementById(inputId);
  const el=document.getElementById(wordsId);
  if(!inp||!el)return;
  const val=parseFloat(inp.value);
  el.textContent=(!val||isNaN(val))?'':numToAr(val);
}
function toWestern(str){
  return String(str).replace(/[٠١٢٣٤٥٦٧٨٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d))
                    .replace(/[۰۱۲۳۴۵۶۷۸۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d));
}
function fixInput(el){
  const val=toWestern(el.value);
  if(el.value!==val){const p=el.selectionStart;el.value=val;try{el.setSelectionRange(p,p);}catch(e){}}
}
document.querySelectorAll('input[type=number]').forEach(el=>{
  el.addEventListener('input',()=>fixInput(el));
});
function calc(source){
  const code=document.getElementById('currency').value;
  const c=CURRENCIES[code];
  const rate=parseFloat(document.getElementById('rate').value)||c.rate;
  const comm=parseFloat(document.getElementById('comm').value)||0;

  document.getElementById('rate-hint').textContent=`1 ${code} = ${rate} ر.س`;

  let sar=parseFloat(document.getElementById('sar').value)||0;
  let foreign=parseFloat(document.getElementById('foreign').value)||0;

  if(source==='sar'){
    const net=sar*(1-comm/100);
    foreign=net/rate;
    document.getElementById('foreign').value=foreign>0?foreign.toFixed(c.decimals):'';
  } else if(source==='foreign'){
    sar=foreign*rate*(1/(1-comm/100));
    document.getElementById('sar').value=sar>0?sar.toFixed(2):'';
  } else if(source==='rate'){
    if(sar>0){
      const net=sar*(1-comm/100);
      foreign=net/rate;
      document.getElementById('foreign').value=foreign>0?foreign.toFixed(c.decimals):'';
    }
  }

  const net=sar*(1-comm/100);
  const buyR=rate*1.002,sellR=rate*0.998;
  const buyP=net/sellR;   // ريال تدفع ← تحصل على عملة بسعر بيع الصراف
  const sellP=net/buyR;   // ريال تحصل ← تبيع عملة بسعر شراء الصراف
  const dec=CURRENCIES[code].decimals;
  document.getElementById('buy-price').textContent=buyP.toFixed(dec);
  document.getElementById('sell-price').textContent=sellP.toFixed(dec);
  setArrow('buy-arrow',buyP,prevBuy);
  setArrow('sell-arrow',sellP,prevSell);
  prevBuy=buyP;prevSell=sellP;
  updateWords('sar','sar-words');
  updateWords('foreign','foreign-words');
  saveSettings();
}

function setArrow(id,cur,prev){
  const el=document.getElementById(id);
  if(cur>prev){el.textContent='↑';el.className='arrow arrow-up';}
  else if(cur<prev){el.textContent='↓';el.className='arrow arrow-down';}
  else{el.textContent='⟷';el.className='arrow';}
}

async function trade(type){
  const code=document.getElementById('currency').value;
  const c=CURRENCIES[code];
  const rate=parseFloat(document.getElementById('rate').value)||c.rate;
  const comm=parseFloat(document.getElementById('comm').value)||0;
  const sar=parseFloat(document.getElementById('sar').value)||0;
  if(!sar){showToast('⚠️ الرجاء إدخال المبلغ أولاً','warn');return;}
  const commAmt=sar*(comm/100);
  const net=sar-commAmt;
  const foreign=net/rate;
  const price=(type==='buy'?rate*1.002:rate*0.998).toFixed(4);
  const tafqeet=toArabicWords(parseFloat(foreign.toFixed(c.decimals)));
  const now=new Date();
  const dateStr=now.toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
  const tx={
    type:type==='buy'?'شراء':'بيع',
    currency:code,flag:c.flag,currencyName:c.name,
    sar:sar.toFixed(2),
    net:net.toFixed(2),
    foreign:foreign.toFixed(c.decimals),
    price,rate,comm,
    commAmt:commAmt.toFixed(2),
    tafqeet,
    date:dateStr+' — '+timeStr,
    ts:now.getTime()
  };
  const duplicate = txs.find(t=>
    t.type===tx.type &&
    t.currency===tx.currency &&
    t.sar===tx.sar &&
    t.price===tx.price &&
    (now.getTime()-(t.ts||0)) < 60000
  );
  if(duplicate){
    const msg=`سبق تسجيل هذه العملية:<br><br>
      <strong>${duplicate.type}</strong> ${duplicate.flag||''} ${duplicate.currency}<br>
      المبلغ: <strong>${parseFloat(duplicate.sar).toLocaleString('en-US',{minimumFractionDigits:2})} ر.س</strong><br>
      السعر المنفّذ: <strong>${duplicate.price}</strong><br>
      التوقيت: ${duplicate.date}<br><br>
      هل تريد حفظها مجدداً؟`;
    const confirmed = await showConfirm(msg);
    if(!confirmed) return;
  }
  try{
    const insertedId = await db.txs.add(tx);
    tx.id = insertedId;
  }catch(e){}
  txs.unshift(tx);
  const rwEl=document.getElementById('result-words');
  const rwText=document.getElementById('result-words-text');
  rwEl.style.display='block';
  rwText.textContent=`${tafqeet} ${c.name}`;
  saveToSupabase(tx).then(()=>loadCloudHistory());
  showToast('✅ تم حفظ العملية بنجاح');
  renderTxs();
}

function renderTxs(){
  const el=document.getElementById('tx-list');
  if(!txs.length){el.innerHTML='<div class="empty">لا توجد عمليات بعد</div>';return;}
  el.innerHTML=txs.map((t,i)=>{
    const isBuy=t.type==='شراء';
    const typeClass=isBuy?'type-buy':'type-sell';
    const borderClass=isBuy?'buy':'sell';
    const arrow=isBuy?'←':'→';
    return `
    <div class="tx ${borderClass}">
      <div class="tx-info">
        <strong class="${typeClass}">${t.type} ${arrow}</strong>&nbsp;
        ${t.flag||'🏳️'} ${t.currency||'SAR'} &nbsp;•&nbsp; 🕐 ${t.date}<br>
        💵 المبلغ: <strong>${parseFloat(t.sar).toLocaleString('en-US',{minimumFractionDigits:2})} ر.س</strong>
        ${parseFloat(t.comm)>0?`| عمولة: ${t.comm}% (<span style="color:#f9a825">${parseFloat(t.commAmt).toLocaleString('en-US',{minimumFractionDigits:2})} ر.س</span>)`:''}<br>
        📊 الصافي: <strong style="color:#4caf50">${parseFloat(t.net).toLocaleString('en-US',{minimumFractionDigits:2})} ر.س</strong>
        &nbsp;⇄&nbsp; <strong style="color:#4a9eff">${parseFloat(t.foreign).toLocaleString('en-US',{minimumFractionDigits:CURRENCIES[t.currency]?.decimals??2})} ${t.currency}</strong><br>
        💱 السعر المنفّذ: <span style="color:#a78bfa">${t.price}</span> &nbsp;|&nbsp; مرجعي: ${t.rate}<br>
        <span class="tx-tafqeet">( ${t.tafqeet||numToAr(parseFloat(t.foreign))} ${t.currencyName||CURRENCIES[t.currency]?.name||t.currency} )</span>
      </div>
      <button class="del-btn" onclick="delTx(${i})">حذف</button>
    </div>`;
  }).join('');
}

async function delTx(i){
  const tx=txs[i];
  const confirmed = await showConfirm(`هل أنت متأكد من حذف هذه العملية؟<br><br><strong>${tx.type}</strong> ${tx.flag||''} ${tx.currency}<br>المبلغ: <strong>${parseFloat(tx.sar).toLocaleString('en-US',{minimumFractionDigits:2})} ر.س</strong>`, {title:'حذف العملية', icon:'🗑️', yesText:'نعم، احذف', noText:'إلغاء'});
  if(!confirmed)return;
  txs.splice(i,1);
  try{if(tx.id) await db.txs.delete(tx.id);}catch(e){}
  renderTxs();
}

function saveLog(){
  const lines=txs.map(t=>[
    `[${t.date}]`,
    `${t.type} | ${t.flag||''} ${t.currency}`,
    `المبلغ: ${t.sar} ر.س`,
    `الصافي: ${t.net} ر.س`,
    `السعر المنفّذ: ${t.price}`,
    `التفقيط: ${t.tafqeet||numToAr(parseFloat(t.net))} ريالاً سعودياً`
  ].join(' | ')).join('\n');
  const blob=new Blob([`سجل العمليات\n${'='.repeat(60)}\n\n${lines}`],{type:'text/plain;charset=UTF-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`سجل_الصرف_${Date.now()}.txt`;a.click();
}
